{% extends "base.html" %}

{% block extra_head %}
    <link rel="stylesheet" href="/static/react_employee_edit.css">
{% endblock %}

{% block content %}
<section class="react-page">
    <div
        id="react-employee-edit-root"
        data-api-url="{{ react_api_url }}"
        data-save-url="{{ react_save_url }}"
        data-classic-url="{{ classic_page_url }}"
        data-list-url="{{ list_url }}"
    ></div>
</section>
{% endblock %}

{% block scripts %}
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="/static/react_employee_edit_page.js"></script>
{% endblock %}

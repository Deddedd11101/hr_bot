{% extends "base.html" %}

{% block extra_head %}
    <link rel="stylesheet" href="/static/workspace_v2/app.css?v=21">
    <style>
        .main:has(#react-scenario-workspace-v2-root) {
            padding-block: 18px 12px;
        }

        .main > .container:has(#react-scenario-workspace-v2-root) {
            width: min(1760px, calc(100vw - var(--sidebar-width, 86px) - 32px));
            max-width: min(1760px, calc(100vw - var(--sidebar-width, 86px) - 32px));
            height: calc(100vh - 30px);
            max-height: calc(100vh - 30px);
            overflow: hidden;
            transition: width 0.28s ease, max-width 0.28s ease;
        }

        .react-page:has(#react-scenario-workspace-v2-root),
        #react-scenario-workspace-v2-root {
            height: 100%;
        }
    </style>
{% endblock %}

{% block content %}
<section class="react-page">
    <div class="react-page-header" style="justify-content: flex-end;">
        <div class="react-detail-header-actions">
            <a href="{{ classic_list_url }}" class="btn-secondary">Классический список</a>
        </div>
    </div>

    <div
        id="react-scenario-workspace-v2-root"
        data-api-url="{{ react_api_url }}"
        data-selected-scenario-id="{{ react_selected_scenario_id }}"
        data-classic-list-url="{{ classic_list_url }}"
    ></div>
</section>
{% endblock %}

{% block scripts %}
    <script type="module" src="/static/workspace_v2/scenario-workspace.js?v=37"></script>
{% endblock %}

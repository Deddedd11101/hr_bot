<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HR Bot Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="header-top">
            <h1 class="logo">HR <span>Bot</span> Admin</h1>
            {% if current_user %}
                <div class="header-user">
                    <span>{{ current_user.login }} · {{ role_labels.get(current_user.role, current_user.role) }}</span>
                    <form method="post" action="/logout">
                        <button type="submit" class="btn-secondary">Выйти</button>
                    </form>
                </div>
            {% endif %}
        </div>
        <nav class="tabs">
            <a href="/candidates" class="{% if active_tab == 'candidates' %}tab tab-active{% else %}tab{% endif %}">Кандидаты</a>
            <a href="/employees" class="{% if active_tab == 'employees' %}tab tab-active{% else %}tab{% endif %}">Сотрудники</a>
            <a href="/bulk-actions" class="{% if active_tab == 'bulk_actions' %}tab tab-active{% else %}tab{% endif %}">Массовые действия</a>
            <a href="/flows" class="{% if active_tab == 'flows' %}tab tab-active{% else %}tab{% endif %}">Сценарии</a>
            <a href="/surveys" class="{% if active_tab == 'surveys' %}tab tab-active{% else %}tab{% endif %}">Опросы</a>
            <a href="/settings" class="{% if active_tab == 'settings' %}tab tab-active{% else %}tab{% endif %}">Настройки</a>
        </nav>
    </div>
</header>

<main class="main">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HR Bot Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header class="header">
    <div class="container">
        <h1 class="logo">HR <span>Bot</span> Admin</h1>
        <nav class="tabs">
            <a href="/employees" class="{% if active_tab == 'employees' %}tab tab-active{% else %}tab{% endif %}">Сотрудники</a>
            <a href="/flows" class="{% if active_tab == 'flows' %}tab tab-active{% else %}tab{% endif %}">Редактирование флоу</a>
            <a href="/settings" class="{% if active_tab == 'settings' %}tab tab-active{% else %}tab{% endif %}">Настройки</a>
        </nav>
    </div>
</header>

<main class="main">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="footer">
    <div class="container">
        <small>Демо онбординга первого дня сотрудника через Telegram‑бота</small>
    </div>
</footer>
</body>
</html>

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app

      - name: Run smoke tests
        env:
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          DATABASE_URL: sqlite:///./ci.db
          ADMIN_SESSION_SECRET: ci-admin-session-secret
        run: python -m unittest tests.test_scenario_engine_smoke -v

      - name: Smoke import application modules
        env:
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          DATABASE_URL: sqlite:///./ci.db
          ADMIN_SESSION_SECRET: ci-admin-session-secret
        run: |
          python -c "from app.config import settings; assert settings.TIMEZONE"
          python -c "from app.main import app; assert app is not None"
          python -c "from app.bot_runner import main; assert main is not None"
